name: Build and Publish

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mod_version: ${{ steps.props.outputs.mod_version }}
      modrinth_id: ${{ steps.props.outputs.modrinth_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Read mod properties
        id: props
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          MODRINTH_ID=$(grep '^modrinth_id=' gradle.properties | cut -d= -f2)
          echo "mod_version=${MOD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "modrinth_id=${MODRINTH_ID}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build jar
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: village-flag-jar
          path: build/libs/village-flag-${{ steps.props.outputs.mod_version }}.jar
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      modrinth_version_id: ${{ steps.publish.outputs.modrinth_version_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: village-flag-jar
          path: build/libs/

      - name: Publish to Modrinth
        id: publish
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          MOD_VERSION: ${{ needs.build.outputs.mod_version }}
          MODRINTH_ID: ${{ needs.build.outputs.modrinth_id }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          JAR_FILE="build/libs/village-flag-${MOD_VERSION}.jar"
          DATA=$(python3 -c "
          import json
          data = {
              'name': 'VillageFlag ${TAG}',
              'version_number': '${TAG}',
              'version_type': 'release',
              'project_id': '${MODRINTH_ID}',
              'dependencies': [],
              'game_versions': ['1.20.1'],
              'loaders': ['forge'],
              'featured': True,
              'file_parts': ['jar']
          }
          print(json.dumps(data))
          ")
          RESPONSE=$(curl -sf \
            -H "Authorization: ${MODRINTH_API_TOKEN}" \
            -F "data=${DATA}" \
            -F "jar=@${JAR_FILE};type=application/java-archive" \
            "https://api.modrinth.com/v2/version")
          MODRINTH_VERSION_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "modrinth_version_id=${MODRINTH_VERSION_ID}" >> "$GITHUB_OUTPUT"

  update-modpack:
    needs: [build, publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Trigger modpack update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MODPACK_DISPATCH_TOKEN }}
          repository: infrastructureSickos/minecraft-modpack
          event-type: village-flag-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
