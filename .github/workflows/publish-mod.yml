name: Build and Publish Mod

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build mod
        run: ./gradlew build

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "version_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version=1.0.0-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "version_name=1.0.0-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Find built jar
        id: jar
        run: |
          JAR=$(ls build/libs/village_flag-*.jar | grep -v sources | head -1)
          echo "path=${JAR}" >> $GITHUB_OUTPUT

      - name: Publish to Modrinth
        id: modrinth
        run: |
          RESPONSE=$(curl -s -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${{ secrets.MODRINTH_API_TOKEN }}" \
            -F "data={\"project_id\":\"${{ secrets.MODRINTH_PROJECT_ID }}\",\"name\":\"${{ steps.version.outputs.version_name }}\",\"version_number\":\"${{ steps.version.outputs.version }}\",\"game_versions\":[\"1.20.1\"],\"loaders\":[\"forge\"],\"version_type\":\"release\",\"featured\":false}" \
            -F "files=@${{ steps.jar.outputs.path }}")
          echo "response=${RESPONSE}" >> $GITHUB_OUTPUT
          MODRINTH_VERSION_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "version_id=${MODRINTH_VERSION_ID}" >> $GITHUB_OUTPUT

      - name: Update Modrinth project categories
        run: |
          curl -sf -X PATCH \
            -H "Authorization: ${{ secrets.MODRINTH_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"categories": ["game-mechanics"]}' \
            "https://api.modrinth.com/v2/project/${{ secrets.MODRINTH_PROJECT_ID }}"
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Update modpack mods-list
        run: |
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/infrastructureSickos/server.git" server-repo
          cd server-repo

          python3 - <<'EOF'
          import json, os

          with open("mods-list.json", "r") as f:
              mods = json.load(f)

          version_id = os.environ["MODRINTH_VERSION_ID"]
          project_id = os.environ["MODRINTH_PROJECT_ID"]

          # Update existing entry or add new one
          found = False
          for mod in mods:
              if mod.get("modrinth_project_id") == project_id or mod.get("name") == "village-flag":
                  mod["version_id"] = version_id
                  mod["modrinth_project_id"] = project_id
                  mod["name"] = "village-flag"
                  found = True
                  break

          if not found:
              mods.append({
                  "name": "village-flag",
                  "modrinth_project_id": project_id,
                  "version_id": version_id
              })

          with open("mods-list.json", "w") as f:
              json.dump(mods, f, indent=2)
              f.write("\n")
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mods-list.json
          git commit -m "chore: update village-flag to ${{ steps.version.outputs.version_name }}"
          git push
        env:
          MODRINTH_VERSION_ID: ${{ steps.modrinth.outputs.version_id }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
